footer_content: "UO Outlands Guide 2026 &mdash; <a href='https://hardlygospel.github.io'>hardlygospel.github.io</a>"

aux_links:
  "← Homepage":
    - "https://hardlygospel.github.io"
  "GitHub":
    - "https://github.com/hardlygospel/uo-outlands-2026-guide"

